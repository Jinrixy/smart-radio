<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>📻 Smart Radio</title>
</head>
<body>
  <div class="radio-container">
    <div class="radio-card text-center">
          <select name="" id="countrySelect" class="form-select mt-2"></select>
    <select name="" id="stationSelect" class="form-select my-2"></select>

    <div class="mt-3">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4Vt9m2sJ7oXUG9m3PWXZ2yJVNyL2yJCZYdQ&s" alt="" id="stationLogo" class="Logo">

        <div id="stationName" class="fw-bold mt2">Select Station</div>
        <div id="stationInfo" class="small-info"></div>
    </div>
            <div class="mt-3 d-flex justify-content-center gap-2">
                <button class="btn-play" onclick="playRadio()">Play</button>
                <button class="btn-stop" onclick="stopRadio()">Stop</button>
            </div>

            <div class="equalizer" id="equalizer"></div>
</div>
</div>

    <audio id="audio" crossorigin="anonymous"></audio>
    <script src="script.js"></script>  
</body>
</html>
